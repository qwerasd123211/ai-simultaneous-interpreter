<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINGUA 字幕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: rgba(15, 23, 42, 0.95);
      color: #e2e8f0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 12px 16px;
      background: rgba(30, 41, 59, 0.8);
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      -webkit-app-region: drag;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #00d4ff;
      letter-spacing: 1px;
    }

    .header-controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .header-btn {
      padding: 4px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
    }

    .header-btn:hover {
      background: rgba(148, 163, 184, 0.2);
      color: #e2e8f0;
    }

    .header-btn.pin-btn.active {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
    }

    .subtitle-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .subtitle-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .subtitle-item {
      background: rgba(30, 41, 59, 0.6);
      border-radius: 8px;
      padding: 12px 16px;
      border-left: 3px solid transparent;
      transition: all 0.3s;
      animation: slideIn 0.3s ease;
    }

    .subtitle-item.streaming {
      border-left-color: #00d4ff;
      background: rgba(0, 212, 255, 0.05);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .subtitle-original {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 4px;
      font-style: italic;
    }

    .subtitle-translated {
      font-size: 15px;
      color: #e2e8f0;
      line-height: 1.5;
      font-weight: 500;
    }

    .subtitle-time {
      font-size: 11px;
      color: #64748b;
      margin-top: 6px;
    }

    .placeholder {
      text-align: center;
      color: #64748b;
      padding: 40px 20px;
    }

    .placeholder-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .placeholder-text {
      font-size: 14px;
      margin-bottom: 8px;
    }

    .placeholder-hint {
      font-size: 12px;
      opacity: 0.7;
    }

    /* 滚动条样式 */
    .subtitle-container::-webkit-scrollbar {
      width: 4px;
    }

    .subtitle-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .subtitle-container::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.2);
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>LINGUA 字幕</h1>
    <div class="header-controls">
      <button class="header-btn pin-btn" id="pinBtn" onclick="togglePin()">📌 置顶</button>
      <button class="header-btn" onclick="clearSubtitles()">清空</button>
      <button class="header-btn" onclick="exportSubtitles()">导出</button>
      <button class="header-btn" onclick="window.close()">关闭</button>
    </div>
  </div>

  <div class="subtitle-container">
    <div class="subtitle-list" id="subtitleList">
      <div class="placeholder">
        <div class="placeholder-icon">📺</div>
        <div class="placeholder-text">等待翻译开始...</div>
        <div class="placeholder-hint">请在主页面点击"开始翻译"</div>
      </div>
    </div>
  </div>

  <script>
    let subtitles = [];
    let isPinned = true;
    let keepWindowOnTopInterval = null;
    let activeSubtitleElement = null;

    // 置顶功能
    function togglePin() {
      isPinned = !isPinned;
      const btn = document.getElementById('pinBtn');
      if (isPinned) {
        btn.classList.add('active');
        btn.textContent = '📌 置顶中';
        startPinLoop();
      } else {
        btn.classList.remove('active');
        btn.textContent = '📌 置顶';
        stopPinLoop();
      }
    }

    function startPinLoop() {
      if (keepWindowOnTopInterval) return;
      keepWindowOnTopInterval = setInterval(() => {
        if (!isPinned) return;
        try {
          // 使用 moveTo + resizeBy 刷新窗口位置，触发浏览器置顶行为
          const x = window.screenX || window.screenLeft;
          const y = window.screenY || window.screenTop;
          window.moveTo(x + 1, y);
          window.moveTo(x, y);
        } catch (e) {}
      }, 2000);
    }

    function stopPinLoop() {
      if (keepWindowOnTopInterval) {
        clearInterval(keepWindowOnTopInterval);
        keepWindowOnTopInterval = null;
      }
    }

    // 清空字幕
    function clearSubtitles() {
      subtitles = [];
      activeSubtitleElement = null;
      const subtitleList = document.getElementById('subtitleList');
      subtitleList.innerHTML = `
        <div class="placeholder">
          <div class="placeholder-icon">📺</div>
          <div class="placeholder-text">字幕已清空</div>
          <div class="placeholder-hint">等待新的翻译内容...</div>
        </div>
      `;
    }

    // 导出字幕
    function exportSubtitles() {
      if (subtitles.length === 0) {
        alert('没有可导出的字幕');
        return;
      }

      let srtContent = '';
      subtitles.forEach((sub, index) => {
        const startTime = formatSrtTime(index * 2);
        const endTime = formatSrtTime((index + 1) * 2);
        srtContent += `${index + 1}\n`;
        srtContent += `${startTime} --> ${endTime}\n`;
        srtContent += `${sub.original}\n`;
        srtContent += `${sub.translated}\n\n`;
      });

      const blob = new Blob([srtContent], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `subtitles_${new Date().toISOString().slice(0, 10)}.srt`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function formatSrtTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const mins = Math.floor((seconds % 3600) / 60);
      const secs = Math.floor(seconds % 60);
      const ms = Math.floor((seconds % 1) * 1000);
      return `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')},${String(ms).padStart(3, '0')}`;
    }

    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 更新字幕内容（流式）
    function updateSubtitle(element, original, translated, time) {
      if (!element) return;
      const originalEl = element.querySelector('.subtitle-original');
      const translatedEl = element.querySelector('.subtitle-translated');
      if (originalEl) originalEl.textContent = original;
      if (translatedEl) translatedEl.textContent = translated;
    }

    // 添加字幕
    function addSubtitle(original, translated, time, isStreaming = false) {
      const subtitleList = document.getElementById('subtitleList');

      // 清空占位符
      if (subtitles.length === 0) {
        subtitleList.innerHTML = '';
      }

      const subtitle = { original, translated, time };
      subtitles.push(subtitle);

      const subtitleElement = document.createElement('div');
      subtitleElement.className = 'subtitle-item';
      if (isStreaming) {
        subtitleElement.classList.add('streaming');
        subtitleElement.dataset.isStreaming = 'true';
      }
      subtitleElement.innerHTML = `
        <div class="subtitle-original">${escapeHtml(original)}</div>
        <div class="subtitle-translated">${escapeHtml(translated)}</div>
        <div class="subtitle-time">${time}</div>
      `;

      subtitleList.appendChild(subtitleElement);

      // 滚动到底部
      const container = document.querySelector('.subtitle-container');
      container.scrollTop = container.scrollHeight;

      // 限制显示数量（保留最近 20 条）
      const items = subtitleList.children;
      if (items.length > 20) {
        subtitleList.removeChild(items[0]);
      }

      return subtitleElement;
    }

    // 监听来自主页面的消息
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'subtitle') {
        const isFinal = event.data.isFinal !== false;
        const original = event.data.original || '';
        const translated = event.data.translated || '';
        const time = event.data.time || new Date().toLocaleTimeString();

        if (isFinal) {
          // 最终结果
          if (activeSubtitleElement) {
            // 更新并最终化
            updateSubtitle(activeSubtitleElement, original, translated, time);
            activeSubtitleElement.classList.remove('streaming');
            activeSubtitleElement.dataset.isStreaming = 'false';
            activeSubtitleElement = null;
          } else {
            // 新字幕
            addSubtitle(original, translated, time, false);
          }
        } else {
          // 中间结果
          if (activeSubtitleElement) {
            // 更新现有流式字幕
            updateSubtitle(activeSubtitleElement, original, translated, time);
          } else {
            // 创建新的流式字幕
            activeSubtitleElement = addSubtitle(original, translated, time, true);
          }
        }

        // 有新字幕时，尝试将窗口带到前台
        if (isPinned) {
          try { window.focus(); } catch (e) {}
        }
      }
      if (event.data && event.data.type === 'init') {
        console.log('字幕窗口已连接到主页面');
        if (isPinned) {
          document.getElementById('pinBtn').classList.add('active');
          document.getElementById('pinBtn').textContent = '📌 置顶中';
          startPinLoop();
        }
      }
    });

    // 页面加载完成后通知主页面
    window.onload = () => {
      if (window.opener) {
        window.opener.postMessage({ type: 'subtitleWindowReady' }, '*');
      }
      // 默认开启置顶
      togglePin();
    };

    // 页面关闭前清理
    window.onbeforeunload = () => {
      stopPinLoop();
      if (window.opener) {
        window.opener.postMessage({ type: 'subtitleWindowClosed' }, '*');
      }
    };
  </script>
</body>
</html>
