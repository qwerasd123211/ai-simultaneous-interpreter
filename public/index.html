<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINGUA // AI 同声传译</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">L</span>
        <div>
          <h1>LINGUA</h1>
          <p class="tagline-text">AI 同声传译助手</p>
        </div>
      </div>

      <div class="topbar-status" aria-label="服务状态">
        <span class="status-pill is-online">服务在线</span>
        <span class="status-pill">实时音频流</span>
        <span class="status-pill">自动修正</span>
      </div>
    </header>

    <main class="workspace">
      <section class="panel control-panel" aria-labelledby="controlTitle">
        <div class="panel-header">
          <div>
            <p class="eyebrow">CONTROL</p>
            <h2 id="controlTitle">翻译控制</h2>
          </div>
        </div>

        <div class="control-buttons">
          <button class="btn btn-primary" id="startBtn" onclick="startTranslation()">
            <span class="btn-icon" aria-hidden="true">▶</span>
            <span>开始翻译</span>
          </button>
          <button class="btn btn-secondary" id="pauseBtn" onclick="pauseTranslation()" disabled>
            <span class="btn-icon" aria-hidden="true">Ⅱ</span>
            <span>暂停</span>
          </button>
          <button class="btn btn-danger" id="stopBtn" onclick="stopTranslation()" disabled>
            <span class="btn-icon" aria-hidden="true">■</span>
            <span>停止</span>
          </button>
          <button class="btn btn-secondary" id="testBtn" onclick="toggleTestMode()">
            <span class="btn-icon" aria-hidden="true">◆</span>
            <span>演示模式</span>
          </button>
        </div>

        <div class="status-box">
          <div class="status-line">
            <span id="status">等待开始翻译...</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-bar" aria-hidden="true">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>

        <div class="glossary-panel">
          <label for="glossaryInput">术语表</label>
          <textarea id="glossaryInput" rows="5" spellcheck="false">Kubernetes => Kubernetes
API => API
React => React</textarea>
          <p>每行一个术语，格式为 <code>英文 => 中文/保留词</code>。</p>
        </div>
      </section>

      <section class="panel subtitle-panel" aria-labelledby="subtitleTitle">
        <div class="panel-header">
          <div>
            <p class="eyebrow">LIVE CAPTION</p>
            <h2 id="subtitleTitle">实时字幕</h2>
          </div>
          <div class="subtitle-controls">
            <button class="btn-small" onclick="clearSubtitles()">清空</button>
            <button class="btn-small" onclick="exportSubtitles()">导出</button>
          </div>
        </div>

        <div class="subtitle-container" id="subtitleContainer">
          <div class="subtitle-placeholder">
            <strong>字幕将在这里实时出现</strong>
            <p>点击开始翻译后，选择带音频的英文视频窗口或标签页。</p>
          </div>
        </div>
      </section>

      <aside class="side-stack">
        <section class="panel metrics-panel" aria-labelledby="metricsTitle">
          <div class="panel-header compact">
            <div>
              <p class="eyebrow">LATENCY</p>
              <h2 id="metricsTitle">实时指标</h2>
            </div>
          </div>

          <div class="live-metrics">
            <div class="metric-card">
              <span class="metric-label">ASR</span>
              <strong id="asrLatency">-- ms</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">翻译</span>
              <strong id="translateLatency">-- ms</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">总延迟</span>
              <strong id="totalLatency">-- ms</strong>
            </div>
            <div class="metric-card">
              <span class="metric-label">修正</span>
              <strong id="revisionStatus">待命</strong>
            </div>
          </div>
        </section>

        <section class="panel history-panel" aria-labelledby="historyTitle">
          <div class="panel-header compact">
            <div>
              <p class="eyebrow">LOG</p>
              <h2 id="historyTitle">翻译历史</h2>
            </div>
            <button class="btn-small" onclick="clearHistory()">清空</button>
          </div>

          <div class="history-list" id="historyList">
            <div class="history-placeholder">
              <p>暂无翻译记录</p>
            </div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <script src="/api/config.js"></script>
  <script src="app.js"></script>
</body>
</html>
