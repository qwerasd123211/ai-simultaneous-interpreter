<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINGUA 字幕</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: rgba(10, 10, 15, 0.95);
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    .subtitle-container {
      padding: 15px;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .subtitle-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      cursor: move;
      user-select: none;
    }

    .subtitle-header h3 {
      font-size: 14px;
      color: #00d4ff;
      letter-spacing: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    .subtitle-controls {
      display: flex;
      gap: 8px;
    }

    .subtitle-controls button {
      padding: 6px 12px;
      background: rgba(0, 212, 255, 0.1);
      color: #00d4ff;
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }

    .subtitle-controls button:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00d4ff;
    }

    .subtitle-controls button.active {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00d4ff;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .subtitle-controls button.pin-btn {
      background: rgba(255, 255, 255, 0.05);
      border-color: rgba(255, 255, 255, 0.2);
      color: rgba(255, 255, 255, 0.6);
    }

    .subtitle-controls button.pin-btn.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: #00d4ff;
      color: #00d4ff;
    }

    .subtitle-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .subtitle-item {
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      animation: fadeIn 0.3s ease;
      border-left: 3px solid #00d4ff;
    }

    .subtitle-original {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
      font-style: italic;
    }

    .subtitle-translated {
      font-size: 18px;
      color: white;
      font-weight: 500;
      line-height: 1.5;
    }

    .subtitle-time {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .subtitle-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      gap: 10px;
    }

    .placeholder-icon {
      font-size: 48px;
      opacity: 0.5;
    }

    .placeholder-text {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
    }

    .placeholder-hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 滚动条样式 */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.5);
    }
  </style>
</head>
<body>
  <div class="subtitle-container">
    <div class="subtitle-header" id="header">
      <h3>LINGUA 字幕</h3>
      <div class="subtitle-controls">
        <button class="pin-btn" id="pinBtn" onclick="togglePin()" title="窗口置顶（尽量保持在前）">📌 置顶</button>
        <button onclick="clearSubtitles()">清空</button>
        <button onclick="exportSubtitles()">导出</button>
        <button onclick="window.close()">关闭</button>
      </div>
    </div>
    <div class="subtitle-list" id="subtitleList">
      <div class="subtitle-placeholder">
        <div class="placeholder-icon">📺</div>
        <div class="placeholder-text">等待翻译开始...</div>
        <div class="placeholder-hint">请在主页面点击"开始翻译"</div>
      </div>
    </div>
  </div>

  <script>
    let subtitles = [];
    let pinInterval = null;
    let isPinned = true; // 默认开启置顶

    // 窗口置顶功能（浏览器安全策略限制，尽力而为）
    function togglePin() {
      isPinned = !isPinned;
      const btn = document.getElementById('pinBtn');
      if (isPinned) {
        btn.classList.add('active');
        btn.textContent = '📌 置顶中';
        startPinLoop();
      } else {
        btn.classList.remove('active');
        btn.textContent = '📌 置顶';
        stopPinLoop();
      }
    }

    function startPinLoop() {
      stopPinLoop();
      pinInterval = setInterval(() => {
        if (!isPinned) return;
        try {
          // 尝试让窗口保持活跃
          if (document.hidden === false) {
            // window.focus() 受浏览器限制，不一定生效
          }
        } catch (e) {}
      }, 2000);
    }

    function stopPinLoop() {
      if (pinInterval) {
        clearInterval(pinInterval);
        pinInterval = null;
      }
    }

    // 当前活跃字幕元素（用于流式更新）
    let activeSubtitleElement = null;

    // 监听来自主页面的消息
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'subtitle') {
        const isFinal = event.data.isFinal !== false;

        if (!isFinal && activeSubtitleElement) {
          // 流式更新：更新现有字幕
          updateSubtitle(activeSubtitleElement, event.data.original, event.data.translated, event.data.time);
        } else if (isFinal && activeSubtitleElement) {
          // 最终结果：更新现有字幕并移除流式标记
          updateSubtitle(activeSubtitleElement, event.data.original, event.data.translated, event.data.time);
          activeSubtitleElement.dataset.isStreaming = 'false';
          activeSubtitleElement.style.borderLeft = '';
          activeSubtitleElement = null;
        } else {
          // 新字幕（最终结果，没有之前的流式字幕）
          addSubtitle(event.data.original, event.data.translated, event.data.time, false);
          activeSubtitleElement = null;
        }
      }
      if (event.data && event.data.type === 'init') {
        console.log('字幕窗口已连接到主页面');
        // 连接后自动开启置顶
        if (isPinned) {
          document.getElementById('pinBtn').classList.add('active');
          document.getElementById('pinBtn').textContent = '📌 置顶中';
          startPinLoop();
        }
      }
    });

    // 更新字幕内容（流式）
    function updateSubtitle(element, original, translated, time) {
      if (!element) return;
      const originalEl = element.querySelector('.subtitle-original');
      const translatedEl = element.querySelector('.subtitle-translated');
      if (originalEl) originalEl.textContent = original;
      if (translatedEl) translatedEl.textContent = translated;
    }

    // 检测主页面是否关闭
    const checkOpener = setInterval(() => {
      if (window.opener && window.opener.closed) {
        clearInterval(checkOpener);
        // 主页面已关闭，但字幕窗口保持打开
        console.log('主页面已关闭');
      }
    }, 5000);

    // 添加字幕
    function addSubtitle(original, translated, time, isStreaming = false) {
      const subtitleList = document.getElementById('subtitleList');

      // 清空占位符
      if (subtitles.length === 0) {
        subtitleList.innerHTML = '';
      }

      const subtitle = {
        original: original,
        translated: translated,
        time: time
      };

      subtitles.push(subtitle);

      const subtitleElement = document.createElement('div');
      subtitleElement.className = 'subtitle-item';
      if (isStreaming) {
        subtitleElement.dataset.isStreaming = 'true';
        subtitleElement.style.borderLeft = '3px solid #00d4ff';
      }
      subtitleElement.innerHTML = `
        <div class="subtitle-original">${escapeHtml(original)}</div>
        <div class="subtitle-translated">${escapeHtml(translated)}</div>
        <div class="subtitle-time">${time}</div>
      `;

      subtitleList.appendChild(subtitleElement);

      // 滚动到底部
      const container = document.querySelector('.subtitle-container');
      container.scrollTop = container.scrollHeight;

      // 限制显示数量（保留最近 20 条）
      const items = subtitleList.children;
      if (items.length > 20) {
        subtitleList.removeChild(items[0]);
      }

      return subtitleElement;
    }

    // 清空字幕
    function clearSubtitles() {
      subtitles = [];
      const subtitleList = document.getElementById('subtitleList');
      subtitleList.innerHTML = `
        <div class="subtitle-placeholder">
          <div class="placeholder-icon">📺</div>
          <div class="placeholder-text">等待翻译开始...</div>
          <div class="placeholder-hint">请在主页面点击"开始翻译"</div>
        </div>
      `;
    }

    // 导出字幕
    function exportSubtitles() {
      if (subtitles.length === 0) {
        alert('没有可导出的字幕');
        return;
      }

      let srt = '';
      subtitles.forEach((subtitle, index) => {
        srt += `${index + 1}\n`;
        srt += `00:00:${String(index * 2).padStart(2, '0')},000 --> 00:00:${String((index + 1) * 2).padStart(2, '0')},000\n`;
        srt += `${subtitle.translated}\n\n`;
      });

      const blob = new Blob([srt], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'subtitles.srt';
      a.click();
      URL.revokeObjectURL(url);
    }

    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 窗口拖拽
    let isDragging = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    const header = document.getElementById('header');

    header.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragOffsetX = e.clientX - window.screenX;
      dragOffsetY = e.clientY - window.screenY;
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        window.moveTo(e.clientX - dragOffsetX, e.clientY - dragOffsetY);
      }
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
  </script>
</body>
</html>
